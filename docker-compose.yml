version: '3.8'

services:

  # ── 1. VERİTABANI ──────────────────────────
  postgres:
    image: postgres:15
    container_name: pipeline_postgres
    networks:
      - pipeline_network
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASS:-pass123}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── 2. SPARK MASTER ────────────────────────
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark_master
    networks:
      - pipeline_network
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    ports:
      - "8080:8080"
      - "7077:7077"

  # ── 3. SPARK WORKER ────────────────────────
  spark-worker:
    image: apache/spark:3.5.1
    build:
      context: .
      dockerfile: spark-worker.Dockerfile
    container_name: spark_worker
    networks:
      - pipeline_network
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    user: root                          # ← EKLE
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master
    volumes:
      - spark_data:/opt/spark/work

  # ── 4. PYTHON UYGULAMA (APP) ───────────────
  app:
    build: .
    container_name: pipeline_app
    networks:
      - pipeline_network
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=ecommerce
      - SPARK_MASTER=spark://spark-master:7077
    depends_on:
      postgres:
        condition: service_healthy
      spark-master:
        condition: service_started
    volumes:
      - ./app:/app
    # FastAPI/Uvicorn kullanıyorsan portu açmalısın
    ports:
      - "8000:8000"
      - "40909:40909"
    command: python main.py

networks:
  pipeline_network:
    driver: bridge

volumes:
  pgdata:
  spark_data: